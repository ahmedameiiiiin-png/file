    .bg-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(10,2,0,0.45) 0%, rgba(60,10,0,0.2) 40%,
        rgba(120,40,0,0.3) 70%, rgba(10,2,0,0.65) 100%);
    }
    .embers { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .ember {
      position: absolute; border-radius: 50%;
      animation: rise var(--ed,8s) ease-in infinite;
      opacity: 0; bottom: 0; left: var(--el,50%);
      width: var(--es,5px); height: var(--es,5px);
      background: var(--ec, rgba(255,140,30,0.8));
    }
    @keyframes rise {
      0%  { opacity:0; transform:translateY(0) scale(1); }
      10% { opacity:0.9; }
      80% { opacity:0.3; }
      100%{ opacity:0; transform:translateY(-100vh) scale(0.3); }
    }
    .content {
      position: relative; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem;
      text-align: center; padding: 2.5rem 2rem;
    }
    .top-icon { font-size: 2rem; letter-spacing: 10px; animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
    .divider {
      width: 120px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,200,100,0.8), transparent);
    }
    .label {
      font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,210,140,0.9); text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600; color: #fff5e0; line-height: 1.35;
      text-shadow: 0 2px 24px rgba(0,0,0,0.8), 0 0 50px rgba(200,80,0,0.35);
    }
    .name-glow {
      color: #ffd580;
      text-shadow: 0 0 20px rgba(255,180,60,0.85), 0 2px 20px rgba(0,0,0,0.7);
    }
    .subtitle {
      font-size: 0.85rem; letter-spacing: 1.2px;
      color: rgba(255,220,170,0.9); text-shadow: 0 1px 10px rgba(0,0,0,0.8);
      font-family: 'Playfair Display', serif; font-style: italic;
      line-height: 1.6; max-width: 420px;
    }
    .btn-row {
      display: flex; gap: 1.5rem; align-items: center; margin-top: 0.5rem;
      position: relative;
    }
    .btn-yes {
      font-family: 'Playfair Display', serif; font-size: 1.1rem;
      padding: 0.75rem 2.4rem;
      background: linear-gradient(135deg, rgba(200,70,10,0.85), rgba(140,30,0,0.9));
      color: #fff5e0; border: 1.5px solid rgba(255,160,60,0.7);
      border-radius: 50px; cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 0 24px rgba(220,90,10,0.55); backdrop-filter: blur(4px);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-yes:hover { transform: scale(1.07); box-shadow: 0 0 40px rgba(255,120,20,0.85); }
    .btn-no {
      font-family: 'Playfair Display', serif; font-size: 1rem;
      padding: 0.65rem 1.8rem; background: rgba(0,0,0,0.3);
      color: #ffe8c0; border: 1.5px solid rgba(255,220,160,0.75);
      border-radius: 50px; cursor: pointer; letter-spacing: 1px;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      transition: font-size 0.1s;
    }
    .btn-no.escaped { position: fixed; }
    .celebration {
      display: none; flex-direction: column; align-items: center;
      gap: 1.2rem; animation: fadeIn 0.6s ease;
      position: relative; z-index: 5; text-align: center; padding: 2.5rem 2rem;
    }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.85);} to{opacity:1;transform:scale(1);} }
    .big-heart { font-size: 5rem; animation: heartbeat 0.8s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100%{transform:scale(1);} 14%{transform:scale(1.3);}
      28%{transform:scale(1);} 42%{transform:scale(1.2);} 70%{transform:scale(1);}
    }
    .cel-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem,4vw,2.2rem); color: #fff5e0; line-height: 1.4;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    .cel-sub {
      font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400;
      color: rgba(255,210,140,0.95); font-size: 1.05rem; letter-spacing: 0.5px;
      line-height: 1.6; max-width: 400px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
<div class="wrap" id="main-bg">
  <div class="bg-img"></div>
  <div class="bg-overlay"></div>
  <div class="embers" id="embers"></div>

  <div class="content" id="main-content">
    <div class="top-icon">🌹 💫 🌹</div>
    <div class="divider"></div>
    <p class="label">a question from the heart</p>
    <h1 class="headline">Would you like to travel<br>with me, <span class="name-glow">Moka</span>? ✈️</h1>
    <p class="subtitle">every city is just a backdrop — you are the only view i ever want to see</p>
    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn-yes" onclick="sayYes()">Yes, always 💕</button>
      <button class="btn-no" id="noBtn" onmouseover="runAway()" ontouchstart="runAway()">No 🍂</button>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="big-heart">💖</div>
    <h2 class="cel-text">I would cross every ocean<br>just to be lost with you, Moka 🌹</h2>
    <p class="cel-sub">wherever we go, home will always be wherever you are standing next to me</p>
    <div style="font-size:1.8rem; letter-spacing:8px; margin-top:0.5rem;">🌍 ✈️ 🌅 🤝 💕</div>
  </div>
</div>

<script>
  const embersEl = document.getElementById('embers');
  const noBtn = document.getElementById('noBtn');
  const emberColors = [
    'rgba(255,140,20,0.9)','rgba(255,80,10,0.8)',
    'rgba(255,200,60,0.7)','rgba(255,60,0,0.6)','rgba(240,160,40,0.8)'
  ];
  for (let i = 0; i < 35; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    const sz = (Math.random()*5+2).toFixed(1);
    e.style.cssText = `--el:${Math.random()*100}%;--ed:${6+Math.random()*8}s;--es:${sz}px;--ec:${emberColors[Math.floor(Math.random()*emberColors.length)]};animation-delay:${Math.random()*8}s;`;
    embersEl.appendChild(e);
  }
  let escapeCount = 0;
  let hasEscaped = false;
  function runAway() {
    escapeCount++;
    if (!hasEscaped) {
      const rect = noBtn.getBoundingClientRect();
      noBtn.classList.add('escaped');
      noBtn.style.left = rect.left + 'px';
      noBtn.style.top = rect.top + 'px';
      hasEscaped = true;
    }
    const m = 24, bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
    noBtn.style.left = (Math.random()*(window.innerWidth-bw-m*2)+m)+'px';
    noBtn.style.top  = (Math.random()*(window.innerHeight-bh-m*2)+m)+'px';
    if (escapeCount > 4) noBtn.style.fontSize = Math.max(0.4, 1-escapeCount*0.06)+'rem';
  }
  function sayYes() {
    document.getElementById('main-content').style.display = 'none';
    noBtn.style.display = 'none';
    document.getElementById('celebration').style.display = 'flex';
    for (let i = 0; i < 50; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      const sz = (Math.random()*8+3).toFixed(1);
      e.style.cssText = `--el:${Math.random()*100}%;--ed:${3+Math.random()*5}s;--es:${sz}px;--ec:${emberColors[Math.floor(Math.random()*emberColors.length)]};animation-delay:${Math.random()*2}s;`;
      embersEl.appendChild(e);
    }
  }
</script>
</body>
</html>
